# Alembic configuration. Most real settings (like the database URL) are pulled
# from your .env via app/config/settings.py inside alembic/env.py, so we keep
# this file minimal.

[alembic]
script_location = alembic
prepend_sys_path = .

# Where new migration files are written.
# version_path_separator must be set to "os" so Alembic splits this option on
# the OS path separator (":"), NOT on whitespace. The project path contains a
# space ("Language AI"); without this, Alembic would split the path on the space
# and fail to locate any migrations.
version_path_separator = os
version_locations = %(here)s/alembic/versions

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
