$kind: http-request
url: "{{base_url}}/auth/login"
method: POST
body:
  type: urlencoded
  content:
    username: "{{doctor_email}}"
    password: "{{password}}"
scripts:
  - type: afterResponse
    code: |-
      var json = pm.response.json();
      pm.collectionVariables.set('doctor_token', json.access_token);
      console.log('Saved doctor token');
    language: text/javascript
order: 4000
